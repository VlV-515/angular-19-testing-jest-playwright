<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  <input
    required
    type="text"
    name="email"
    formControlName="email"
    placeholder="Email"
  />
  <input
    required
    type="password"
    name="password"
    formControlName="password"
    placeholder="Password"
  />
  <button type="submit" [disabled]="loginForm.invalid">Login</button>
  @if (errorMessage) {
    <div>{{ errorMessage }}</div>
  }
</form>
